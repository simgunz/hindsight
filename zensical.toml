[project]
site_name = "Hindsight"
site_description = "Hands-free delayed video mirror for reviewing your training form."
extra_css = ["stylesheets/extra.css"]

# Explicit navigation. Top-level entries become tabs; group pages under a
# section so individual docs don't each occupy their own tab.
nav = [
  { "Home" = "index.md" },
  { "Vision" = [
    { "Idea" = "vision/idea.md" },
    { "Glossary" = "vision/glossary.md" },
    { "Domain Context" = "vision/domain-context.md" },
  ] },
  { "User Stories" = "user-stories/index.md" },
  { "Requirements" = [
    { "Overview" = "requirements/index.md" },
    { "Delayed Mirror" = "requirements/functional/delayed-mirror.md" },
    { "Delay Control" = "requirements/functional/delay-control.md" },
    { "Playback" = "requirements/functional/playback.md" },
    { "Live Mirror" = "requirements/functional/live-mirror.md" },
    { "Non-functional" = "requirements/non-functional.md" },
  ] },
  { "Decisions" = "decisions/index.md" },
  { "Open Questions" = "open-questions.md" },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

# Page-status identifiers, shown as a badge in the nav and at the top of the
# page. Set `status:` in a page's front matter to use one. Icon/colour for these
# custom statuses is defined in stylesheets/extra.css.
#
# Status is only for docs with a real lifecycle: requirements and user stories
# use   draft -> approved -> in-progress -> implemented
# decisions (ADRs) use   proposed -> approved -> rejected -> superseded
# Reference/narrative docs (vision, glossary, domain context, home) carry NO status.
[project.extra.status]
draft = "Draft"
approved = "Approved"
in-progress = "In progress"
implemented = "Implemented"
proposed = "Proposed"
rejected = "Rejected"
superseded = "Superseded"
